<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1d23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Med Basha v80.0 - Full Master</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLi_wlkO5zB52s6Kegc6ANZVeH6mHP5DY",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:873240d85ac5160f392476",
            measurementId: "G-B6RRDBDM4R"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.cloudSave = async (dbName, data) => { try { await setDoc(doc(db, "usuarios", "conductor_menorca", "datos", dbName), { payload: data }); } catch (e) { console.error(e); } };
        window.setupSync = (dbName, callback) => { onSnapshot(doc(db, "usuarios", "conductor_menorca", "datos", dbName), (doc) => { if (doc.exists()) callback(doc.data().payload); }); };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #1a1d23; color: #e2e8f0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-main { background: #23272e; border-radius: 1.2rem; border: 2px solid #2d333f; overflow: hidden; }
        .block-hora { background-color: #1e293b; padding: 12px; }
        input { background: transparent; border: none; color: white; font-weight: 800; outline: none; }
        input[type="time"] { font-size: 1.8rem; color: #60a5fa; width: 100%; }
        input[type="number"] { font-size: 1.5rem; color: #22d3ee; width: 100%; }
        .label-custom { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-btn { flex: 1; padding: 14px; text-align: center; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; border-bottom: 4px solid transparent; }
        .nav-active { border-color: #3b82f6; color: #3b82f6; background: #23272e; }
        .alarm-btn { background-color: #0891b2; border-radius: 10px; padding: 8px; margin-top: 6px; font-size: 10px; font-weight: 900; color: white; width: 100%; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; gap: 4px; }
        .badge-aviso { animation: pulse 2s infinite; background-color: #facc15 !important; color: #000 !important; font-weight: 900 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body x-data="tmsaApp()" x-init="initApp()">

    <header class="p-4 flex justify-between items-center bg-[#1a1d23]">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">MED BASHA <span class="text-[10px] text-gray-500 font-normal ml-1">v80.0</span></h1>
    </header>

    <nav class="flex bg-[#1a1d23] sticky top-0 z-50 border-b border-white/10">
        <button @click="view = 'registro'" :class="view === 'registro' ? 'nav-active text-blue-400' : 'text-gray-500'" class="nav-btn">Agenda Diario</button>
        <button @click="view = 'historial'" :class="view === 'historial' ? 'nav-active text-blue-400' : 'text-gray-500'" class="nav-btn">Resumen Mes</button>
    </nav>

    <main x-show="view === 'registro'" class="p-4 space-y-6 pb-44">
        
        <div class="card-main p-3">
            <div class="flex justify-between items-center px-2 mb-3 text-xs font-black uppercase">
                <span class="text-blue-400 font-black" x-text="mesNombre + ' ' + año"></span>
                <div class="flex gap-6">
                    <button @click="cambiarMes(-1)" class="material-symbols-outlined text-blue-400">chevron_left</button>
                    <button @click="cambiarMes(1)" class="material-symbols-outlined text-blue-400">chevron_right</button>
                </div>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center">
                <template x-for="dia in diasCalendario">
                    <div @click="seleccionarDia(dia.fecha)" class="py-3 text-sm cursor-pointer flex flex-col items-center">
                         <span :class="[dia.isHoy ? 'bg-white text-black rounded-lg px-2 font-black' : '', dia.fecha === fechaSeleccionada ? 'border-2 border-blue-500 rounded-lg px-2' : '']" x-text="dia.num"></span>
                         <div class="flex gap-1 mt-1.5 h-1.5">
                             <template x-if="getTipoDia(dia.fecha)">
                                 <div :class="getTipoDia(dia.fecha).tipo === 'partido' ? 'bg-orange-500' : 'bg-blue-500'" class="w-2 h-2 rounded-full"></div>
                             </template>
                         </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="flex card-main p-1 gap-1">
            <button @click="form.tipo = 'continuo'; calcularTodo()" :class="form.tipo === 'continuo' ? 'bg-blue-600 text-white shadow-lg' : 'text-gray-500'" class="flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all">Turno Continuo</button>
            <button @click="form.tipo = 'partido'; calcularTodo()" :class="form.tipo === 'partido' ? 'bg-orange-600 text-white shadow-lg' : 'text-gray-500'" class="flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all">Turno Partido</button>
        </div>

        <section class="card-main">
            <div class="flex justify-between items-center p-4 bg-black/30">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest" x-text="form.tipo === 'partido' ? 'Mañana' : 'Jornada Única'"></span>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-yellow-500 uppercase">Bus:</span>
                    <input type="text" x-model="form.bus1" @input="saveDraft()" placeholder="00" class="w-16 bg-black/40 rounded-lg px-3 py-1 text-yellow-400 text-right text-lg font-black">
                </div>
            </div>
            <div class="grid grid-cols-2 border-b border-black/20">
                <div class="block-hora border-r border-black/30">
                    <label class="label-custom text-blue-300">Entrada</label>
                    <input type="time" x-model="form.horaE1" @input="calcularTodo(); sugerirAlarma()">
                    <template x-if="alarmaDisponible">
                        <button @click="lanzarAlarma()" class="alarm-btn active:scale-95 transition-transform">
                            <span class="material-symbols-outlined text-[14px]">alarm</span>
                            ALARMA <span x-text="horaAlarmaStr"></span>
                        </button>
                    </template>
                </div>
                <div class="block-hora">
                    <label class="label-custom text-red-400">Salida</label>
                    <input type="time" x-model="form.horaS1" @input="validarYCalcular()">
                </div>
            </div>
            <div class="grid grid-cols-2 bg-black/10">
                <div class="block-hora border-r border-black/30"><label class="label-custom text-cyan-400">KM Inicio</label><input type="number" x-model="form.kmI1" @input="calcularTodo()"></div>
                <div class="block-hora"><label class="label-custom text-cyan-400">KM Fin</label><input type="number" x-model="form.kmF1" @input="calcularTodo()"></div>
            </div>
        </section>

        <section x-show="form.tipo === 'partido'" class="card-main border-orange-500/30" x-cloak>
            <div class="p-3 bg-black/30 text-[10px] font-black text-orange-400 uppercase text-center tracking-widest">Tramo Tarde</div>
            <div class="grid grid-cols-2">
                <div class="block-hora border-r border-black/30"><label class="label-custom text-blue-300">Entrada 2</label><input type="time" x-model="form.horaE2" @input="calcularTodo()"></div>
                <div class="block-hora"><label class="label-custom text-red-400">Salida 2</label><input type="time" x-model="form.horaS2" @input="calcularTodo()"></div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-3">
            <button @click="toggleDiet('comida')" :class="estiloBoton(form.comida)" class="py-5 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all">
                <span class="material-symbols-outlined">restaurant</span>
                <span class="text-[10px] font-black uppercase" x-text="form.comida === 'AVISO' ? '¿Comida?' : 'Comida'"></span>
            </button>
            <button @click="toggleDiet('cena')" :class="estiloBoton(form.cena)" class="py-5 rounded-2xl border-2 flex flex-col items-center gap-1 transition-all">
                <span class="material-symbols-outlined">dinner_dining</span>
                <span class="text-[10px] font-black uppercase" x-text="form.cena === 'AVISO' ? '¿Cena?' : 'Cena'"></span>
            </button>
        </div>

        <button @click="guardarJornada()" class="w-full h-20 bg-blue-700 text-white font-black rounded-3xl text-lg shadow-2xl active:scale-95 transition-all uppercase border-b-4 border-blue-900">GUARDAR JORNADA</button>
    </main>

    <main x-show="view === 'historial'" class="p-4 space-y-4 pb-24" x-cloak>
        
        <section class="card-main p-4 bg-gradient-to-br from-blue-900/20 to-transparent">
            <div class="flex justify-between items-center mb-4">
                <button @click="cambiarMes(-1)" class="material-symbols-outlined text-blue-400">arrow_back_ios</button>
                <h2 class="text-xl font-black text-white uppercase" x-text="mesNombre + ' ' + año"></h2>
                <button @click="cambiarMes(1)" class="material-symbols-outlined text-blue-400">arrow_forward_ios</button>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center text-white">
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] text-gray-500 font-black uppercase">Horas</span><p class="text-sm font-black" x-text="stats.horas"></p></div>
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] text-gray-500 font-black uppercase">Dietas</span><p class="text-sm font-black" x-text="stats.dietas"></p></div>
                <div class="bg-black/30 p-2 rounded-lg"><span class="text-[8px] text-gray-500 font-black uppercase">KM</span><p class="text-sm font-black" x-text="stats.km"></p></div>
            </div>
        </section>

        <div class="card-main overflow-hidden border-white/5 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#1a1d23] text-[9px] text-blue-400 font-black uppercase tracking-widest border-b border-white/10">
                    <tr><th class="p-3 pl-4">Día</th><th>Bus</th><th>Horas</th><th>Dta</th><th>KM</th><th class="pr-3 text-right"></th></tr>
                </thead>
                <tbody class="text-[11px] font-bold">
                    <template x-for="(item, index) in historyConSemanas" :key="index">
                        <template x-if="item.isCabecera">
                            <tr class="bg-blue-600/90 text-white"><td colspan="6" class="p-1.5 text-center text-[9px] font-black uppercase tracking-[0.2em]" x-text="'SEMANA ' + item.numSemana"></td></tr>
                        </template>
                        <template x-if="!item.isCabecera && !item.isSemana">
                            <tr class="border-b border-white/5 even:bg-white/[0.02]">
                                <td class="p-3 pl-4 text-white font-black" x-text="item.fecha.split('-').reverse()[0]"></td>
                                <td class="text-yellow-500 font-black" x-text="item.bus"></td>
                                <td class="text-white" x-text="item.hStr"></td>
                                <td class="text-green-500" x-text="item.dieta"></td>
                                <td class="text-cyan-400" x-text="item.km"></td>
                                <td class="pr-3 text-right"><button @click="borrarFila(item.fecha)" class="material-symbols-outlined text-red-500/30 text-lg">delete</button></td>
                            </tr>
                        </template>
                        <template x-if="item.isSemana">
                            <tr class="bg-emerald-500/10 text-emerald-400 border-b border-emerald-500/20 italic">
                                <td colspan="2" class="p-2 pl-4 text-[8px] uppercase font-black">Subtotal Sem.</td>
                                <td class="font-black text-[10px]" x-text="item.hRaw.toFixed(1) + 'h'"></td>
                                <td x-text="item.dieta"></td>
                                <td x-text="item.km"></td>
                                <td></td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </table>

            <div class="p-4 bg-black/40">
                <button @click="archivarMes()" class="w-full py-4 bg-blue-700 text-white font-black rounded-xl text-[10px] uppercase shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-sm">inventory_2</span>
                    Cerrar Mes y Archivar
                </button>
            </div>
        </div>

        <template x-if="archivo.length > 0">
            <div class="space-y-2 mt-6">
                <h3 class="text-[10px] font-black text-gray-500 uppercase px-2 tracking-widest">Histórico Guardado</h3>
                <template x-for="mes in archivo" :key="mes.id">
                    <div class="card-main p-4 flex justify-between items-center bg-black/30 border-white/5">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                                <span class="material-symbols-outlined">folder</span>
                            </div>
                            <div>
                                <p class="text-xs font-black text-white uppercase" x-text="mes.nombre"></p>
                                <p class="text-[9px] font-black text-gray-400 tracking-tight" x-text="mes.horas + 'H | ' + mes.dietas + ' DIETAS | ' + mes.km + ' KM'"></p>
                            </div>
                        </div>
                        <button @click="borrarMesArchivado(mes.id)" class="material-symbols-outlined text-gray-600 text-sm">delete_forever</button>
                    </div>
                </template>
            </div>
        </template>
    </main>

    <footer x-show="view === 'registro'" class="fixed bottom-0 left-0 w-full p-5 bg-[#1a1d23]/95 backdrop-blur-md border-t border-white/10 flex justify-between items-center z-50">
        <div><span class="text-[10px] text-gray-400 font-black uppercase">KM HOY</span><p class="text-2xl font-black text-cyan-400" x-text="res.kmTotales"></p></div>
        <div class="text-right"><span class="text-[10px] text-yellow-500 font-black uppercase">TOTAL JORNADA</span><p class="text-5xl font-black text-white" x-text="res.total"></p></div>
    </footer>

    <script>
        function tmsaApp() {
            return {
                view: 'registro', fechaSeleccionada: new Date().toISOString().split('T')[0],
                form: { tipo: 'continuo', bus1: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', comida: 'NO', cena: 'NO' },
                res: { total: '00:00', kmTotales: 0, realMin: 0 },
                history: [], archivo: [], stats: { horas: 0, dietas: 0, km: 0 },
                mes: new Date().getMonth(), año: new Date().getFullYear(), mesNombre: '', diasCalendario: [],
                alarmaDisponible: false, horaAlarmaStr: '',

                initApp() {
                    this.history = JSON.parse(localStorage.getItem('tmsa_history_v80') || '[]');
                    this.archivo = JSON.parse(localStorage.getItem('tmsa_archivo_v80') || '[]');
                    
                    // Sincronización Nube
                    window.setupSync('history', (data) => { if(data && JSON.stringify(this.history) !== JSON.stringify(data)) { this.history = data; this.sumarTotales(); }});
                    window.setupSync('archivo', (data) => { if(data && JSON.stringify(this.archivo) !== JSON.stringify(data)) { this.archivo = data; }});
                    
                    this.renderCalendario(); 
                    this.cargarHojaDesdeMemoria(); 
                    this.sumarTotales();
                },

                validarYCalcular() {
                    if (this.form.horaS1 && !this.form.horaE1) { alert("🚨 SUPERVISOR: No hay hora de Entrada puesta."); this.form.horaS1 = ''; return; }
                    this.calcularTodo();
                },

                sugerirAlarma() {
                    if (!this.form.horaE1) { this.alarmaDisponible = false; return; }
                    let [h, m] = this.form.horaE1.split(':').map(Number);
                    let d = new Date(); d.setHours(h, m, 0); d.setMinutes(d.getMinutes() - 45); // RESTAR 45 MINUTOS
                    this.horaAlarmaStr = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                    this.alarmaDisponible = true;
                },

                lanzarAlarma() {
                    let [h, m] = this.horaAlarmaStr.split(':');
                    window.location.href = `intent://#Intent;action=android.intent.action.SET_ALARM;i.android.intent.extra.alarm.HOUR=${parseInt(h)};i.android.intent.extra.alarm.MINUTES=${parseInt(m)};s.android.intent.extra.alarm.MESSAGE=Bus;b.android.intent.extra.alarm.SKIP_UI=false;end`;
                },

                calcularTodo() {
                    const calcMin = (hE, hS) => { if(!hE || !hS) return 0; let d1 = new Date("2000-01-01T"+hE), d2 = new Date("2000-01-01T"+hS); if(d2<=d1) d2.setDate(d2.getDate()+1); return (d2-d1)/60000; };
                    let m1 = calcMin(this.form.horaE1, this.form.horaS1);
                    let m2 = (this.form.tipo === 'partido') ? calcMin(this.form.horaE2, this.form.horaS2) : 0;
                    this.res.realMin = m1 + m2;
                    this.res.kmTotales = (this.form.kmF1 && this.form.kmI1) ? (this.form.kmF1 - this.form.kmI1) : 0;
                    
                    const hTotal = this.res.realMin / 60;
                    const hSalidaFin = (this.form.tipo === 'partido' && this.form.horaS2) ? this.form.horaS2 : this.form.horaS1;
                    
                    // DIETAS MENORCA
                    if (this.form.horaE1 && this.form.horaE1 < "14:00") {
                        if ((hTotal >= 9 && hSalidaFin >= "15:00") || (hTotal >= 6 && hSalidaFin >= "15:30")) this.form.comida = "SI";
                        else if (hSalidaFin >= "14:30" && hSalidaFin < "15:30") this.form.comida = "AVISO";
                        else this.form.comida = "NO";
                    }
                    if (hSalidaFin >= "23:00" || (hSalidaFin >= "00:00" && hSalidaFin <= "05:00")) this.form.cena = "SI";
                    else if (hSalidaFin >= "22:00") this.form.cena = "AVISO";
                    else this.form.cena = "NO";

                    let dM = this.res.realMin > 0 && this.res.realMin < 360 ? 360 : this.res.realMin;
                    this.res.total = Math.floor(dM/60).toString().padStart(2,'0') + ":" + Math.round(dM%60).toString().padStart(2,'0');
                    this.saveDraft();
                },

                estiloBoton(estado) {
                    if (estado === 'SI') return 'bg-green-600 border-green-400 text-white';
                    if (estado === 'AVISO') return 'badge-aviso border-yellow-600';
                    return 'bg-gray-800 border-gray-700 text-gray-500';
                },

                toggleDiet(type) { this.form[type] = (this.form[type] === 'SI' ? 'NO' : 'SI'); this.saveDraft(); },

                guardarJornada() {
                    if (!this.form.bus1) { alert("🚨 SUPERVISOR: ¡Número de BUS obligatorio!"); return; }
                    
                    if (this.alarmaDisponible) {
                        if (confirm(`¿Poner alarma 45 min antes (${this.horaAlarmaStr})?`)) this.lanzarAlarma();
                    }

                    this.history = this.history.filter(i => i.fecha !== this.fechaSeleccionada);
                    const dietas = (this.form.comida === 'SI' ? 1 : 0) + (this.form.cena === 'SI' ? 1 : 0);
                    const hParts = this.res.total.split(':');
                    this.history.push({ 
                        fecha: this.fechaSeleccionada, 
                        bus: this.form.bus1, 
                        hStr: this.res.total, 
                        hRaw: parseInt(hParts[0]) + (parseInt(hParts[1])/60), 
                        dieta: dietas, 
                        tipo: this.form.tipo, 
                        km: this.res.kmTotales 
                    });
                    
                    this.updateAllStores();
                    alert("✅ Guardado en historial y nube.");
                },

                archivarMes() {
                    const id = `${this.año}-${this.mes}`;
                    if (this.archivo.some(a => a.id === id)) this.archivo = this.archivo.filter(a => a.id !== id);
                    
                    this.archivo.unshift({
                        id,
                        nombre: `${this.mesNombre} ${this.año}`,
                        horas: this.stats.horas,
                        dietas: this.stats.dietas,
                        km: this.stats.km
                    });
                    
                    localStorage.setItem('tmsa_archivo_v80', JSON.stringify(this.archivo));
                    window.cloudSave('archivo', this.archivo);
                    alert("📦 Mes guardado en el archivo permanente.");
                },

                get historyConSemanas() {
                    const mesSel = `${this.año}-${String(this.mes+1).padStart(2,'0')}`;
                    let raw = this.history.filter(i => i.fecha.startsWith(mesSel)).sort((a,b) => a.fecha.localeCompare(b.fecha));
                    let result = [], subH = 0, subD = 0, subK = 0, lastW = null;
                    
                    raw.forEach((item, index) => {
                        let d = new Date(item.fecha);
                        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
                        let curW = Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
                        
                        if (lastW !== null && curW !== lastW) { 
                            result.push({ isSemana: true, hRaw: subH, dieta: subD, km: subK }); 
                            subH = subD = subK = 0; 
                        }
                        if (curW !== lastW) { result.push({ isCabecera: true, numSemana: curW }); lastW = curW; }
                        result.push(item);
                        subH += item.hRaw; subD += item.dieta; subK += item.km;
                        if (index === raw.length - 1) result.push({ isSemana: true, hRaw: subH, dieta: subD, km: subK });
                    });
                    return result;
                },

                sumarTotales() {
                    const mesSel = `${this.año}-${String(this.mes+1).padStart(2,'0')}`;
                    let h=0, d=0, k=0;
                    this.history.forEach(i => { if(i.fecha.startsWith(mesSel)) { h+=i.hRaw; d+=i.dieta; k+=i.km; } });
                    this.stats = { horas: h.toFixed(1), dietas: d, km: k };
                },

                renderCalendario() {
                    const days = new Date(this.año, this.mes + 1, 0).getDate();
                    this.mesNombre = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(new Date(this.año, this.mes));
                    this.diasCalendario = [];
                    for(let i=1; i<=days; i++) {
                        let f = `${this.año}-${String(this.mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                        this.diasCalendario.push({ num: i, fecha: f, isHoy: f === new Date().toISOString().split('T')[0] });
                    }
                },

                updateAllStores() {
                    localStorage.setItem('tmsa_history_v80', JSON.stringify(this.history));
                    window.cloudSave('history', this.history);
                    this.sumarTotales();
                },

                getTipoDia(f) { return this.history.find(i => i.fecha === f); },
                cargarHojaDesdeMemoria() {
                    const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v80') || '{}');
                    this.form = saved[this.fechaSeleccionada] || { tipo: 'continuo', bus1: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', comida: 'NO', cena: 'NO' };
                    this.calcularTodo(); this.sugerirAlarma();
                },
                saveDraft() {
                    const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v80') || '{}');
                    saved[this.fechaSeleccionada] = this.form;
                    localStorage.setItem('tmsa_drafts_v80', JSON.stringify(saved));
                },
                seleccionarDia(f) { this.fechaSeleccionada = f; this.cargarHojaDesdeMemoria(); },
                cambiarMes(v) { this.mes += v; if(this.mes<0){this.mes=11;this.año--} if(this.mes>11){this.mes=0;this.año++} this.renderCalendario(); this.sumarTotales(); },
                borrarFila(f) { if(confirm("¿Eliminar día?")){this.history = this.history.filter(i => i.fecha !== f); this.updateAllStores(); }},
                borrarMesArchivado(id) { if(confirm("¿Eliminar del archivo?")){this.archivo = this.archivo.filter(a => a.id !== id); localStorage.setItem('tmsa_archivo_v80', JSON.stringify(this.archivo)); window.cloudSave('archivo', this.archivo); }}
            }
        }
    </script>
</body>
